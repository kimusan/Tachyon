version: '2'
services:
  tachyon:
    image: ghcr.io/kimusan/tachyon:latest
    ports:
      - 8888:8888
    environment:
      - DEBUG=true
    volumes:
      - tachyon:/var/lib/tachyon
    networks:
      - default
      - db-network
      - redis-network
    restart: unless-stopped

  # This provides prometheus metrics for tachyon's php-fpm
  php-fpm-exporter:
    image: hipages/php-fpm_exporter:2.2.0
    ports:
      - 9253:9253
    environment:
      - PHP_FPM_SCRAPE_URI=tcp://tachyon:9000/status
    networks:
      - default

  mysql:
    image: mariadb:10
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=tachyon
      - MYSQL_PASSWORD=tachyon
      - MYSQL_DATABASE=tachyon
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - db-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - redis-network
    restart: unless-stopped

networks:
  default:
  db-network:
    internal: true
  redis-network:
    internal: true

volumes:
  mysql:
    driver: local
  tachyon:
    driver: local
