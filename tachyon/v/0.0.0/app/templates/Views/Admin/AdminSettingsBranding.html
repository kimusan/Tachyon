<div class="form-horizontal">
	<div class="legend" data-i18n="TAB_BRANDING/LEGEND_BRANDING"></div>
	<div class="control-group">
		<label data-i18n="TAB_BRANDING/LABEL_PAGE_TITLE"></label>
		<input class="span5" type="text" autocorrect="off" data-bind="textInput: title, saveTrigger: titleTrigger">
	</div>
	<div class="control-group">
		<label data-i18n="TAB_BRANDING/LABEL_LOADING_DESCRIPTION"></label>
		<input class="span5" type="text" autocorrect="off" data-bind="textInput: loadingDescription, saveTrigger: loadingDescriptionTrigger">
	</div>
	<div class="control-group">
		<label data-i18n="TAB_BRANDING/LABEL_FAVICON_URL"></label>
		<input class="span5" type="text" placeholder="https://" autocorrect="off" data-bind="textInput: faviconUrl, saveTrigger: faviconUrlTrigger">
	</div>

	<div class="legend" data-i18n="TAB_BRANDING/LEGEND_LOGO"></div>
	<div class="control-group">
		<label data-i18n="TAB_BRANDING/LABEL_LOGIN_LOGO"></label>
		<div>
			<div data-bind="visible: logoFile()" style="display:none; margin-bottom: 8px;">
				<img data-bind="attr: { src: logoUrl }" alt="Logo" style="max-height: 80px; max-width: 300px; display: block; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; padding: 4px; background: #fff;">
				<a href="#" class="btn btn-danger btn-small" data-bind="click: deleteLogo" data-i18n="TAB_BRANDING/BUTTON_DELETE_LOGO"></a>
			</div>
			<p data-bind="visible: !logoFile()" style="color: #999; margin-bottom: 8px;" data-i18n="TAB_BRANDING/LABEL_NO_LOGO"></p>
			<label class="btn btn-small" data-bind="css: { disabled: logoUploading() }">
				<input type="file" accept="image/png,image/jpeg,image/gif,image/svg+xml,image/webp" style="display:none"
					data-bind="event: { change: uploadLogo }, disable: logoUploading">
				<span data-bind="visible: logoUploading()" data-i18n="GLOBAL/LOADING" style="display:none"></span>
				<span data-bind="visible: !logoUploading()" data-i18n="TAB_BRANDING/BUTTON_UPLOAD_LOGO"></span>
			</label>
			<p class="text-error" style="display:none; margin-top: 6px;" data-bind="visible: logoError(), text: logoError"></p>
		</div>
	</div>
</div>
