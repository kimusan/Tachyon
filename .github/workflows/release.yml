name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and attach release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip, phar

      - name: Install dpkg tools
        run: sudo apt-get install -y dpkg-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Verify package.json version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($GITHUB_REF_NAME)"
            exit 1
          fi
          echo "Version: $PKG_VERSION"

      - name: Build release (JS/CSS + PHP archive + plugins)
        run: PATH="$PATH:node_modules/.bin" php cli/release.php --debian --nextcloud --owncloud

      - name: Commit updated packages.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages.json
          git diff --cached --quiet || git commit -m "chore: update packages.json for $GITHUB_REF_NAME [skip ci]"
          git checkout -- .
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/dist/releases/webmail/*/tachyon-*.tar.gz
            build/dist/releases/webmail/*/tachyon-*.zip
            build/dist/releases/webmail/*/tachyon_*.deb
            build/dist/releases/webmail/*/tachyon-*-nextcloud.tar.gz
            build/dist/releases/webmail/*/tachyon-*-owncloud.tar.gz
            build/dist/releases/plugins/*.tgz
            packages.json
