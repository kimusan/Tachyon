<div class="btn-toolbar g-ui-user-select-none">
	<div class="audioPlace"
			data-bind="visible: '' !== currentAudio(), attr: { title: currentAudio }, click: stopPlay">
		<div class="playIcon"><div></div></div>
		<i class="stopIcon fontastic">⏸</i>
	</div>
	<div class="btn-group dropdown" data-bind="registerBootstrapDropdown: true, initDom: accountMenu">
		<a id="top-system-dropdown-id" href="#" tabindex="-1" class="btn single btn-block dropdown-toggle">
			<span class="accountPlace hide-mobile" data-bind="text: accountName(), attr:{ title: accountEmail }"></span>
			<i class="fontastic" data-bind="css: {'icon-spinner': accountsLoading()}">👤</i>
			<b data-bind="text: accountsUnreadCount, visible: 100 > accountsUnreadCount() && accountsUnreadCount()"></b>
			<b data-bind="visible: 99 < accountsUnreadCount()">99+</b>
		</a>
		<menu class="dropdown-menu right-edge" tabindex="-1" role="menu" aria-labelledby="top-system-dropdown-id">

			<li class="color-scheme-toggle" role="presentation">
				<div class="color-scheme-buttons">
					<button type="button" class="color-scheme-btn" data-bind="click: lightModeClick, css: { active: 'light' === colorSchemeMode() }, attr: { title: 'Light mode', 'aria-pressed': 'light' === colorSchemeMode() }" aria-label="Light mode">☀</button>
					<button type="button" class="color-scheme-btn" data-bind="click: systemModeClick, css: { active: '' === colorSchemeMode() }, attr: { title: 'System mode', 'aria-pressed': '' === colorSchemeMode() }" aria-label="System mode">⊙</button>
					<button type="button" class="color-scheme-btn" data-bind="click: darkModeClick, css: { active: 'dark' === colorSchemeMode() }, attr: { title: 'Dark mode', 'aria-pressed': 'dark' === colorSchemeMode() }" aria-label="Dark mode">☾</button>
				</div>
			</li>

			<!-- ko foreach: accounts -->
			<li role="presentation">
				<a class="email-title" href="#" data-bind="click: $root.accountClick, text: label(),
					attr: {title: email, 'data-unread': unreadEmails, 'data-icon': $root.accountEmail() === email ? '✔' : '👤'}"></a>
			</li>
			<!-- /ko -->

			<li class="dividerbar" role="presentation" data-bind="visible: allowAccounts">
				<a href="#" tabindex="-1" data-bind="click: addAccountClick" data-icon="✚" data-i18n="TOP_TOOLBAR/BUTTON_ADD_ACCOUNT"></a>
			</li>
			<li role="presentation" data-bind="visible: allowContacts">
				<a href="#" tabindex="-1" data-bind="click: contactsClick" data-icon="📇" data-i18n="GLOBAL/CONTACTS"></a>
			</li>
			<li role="presentation">
				<a href="#" tabindex="-1" data-bind="click: settingsClick" data-icon="⚙" data-i18n="TITLES/SETTINGS"></a>
			</li>
			<li role="presentation">
				<a href="#" tabindex="-1" data-bind="click: settingsHelp" data-icon="🛈" data-i18n="GLOBAL/HELP"></a>
			</li>
			<li class="dividerbar" role="presentation">
				<a href="#" tabindex="-1" data-bind="click: logoutClick" data-icon="⏻" data-i18n="GLOBAL/LOGOUT"></a>
			</li>
		</menu>
	</div>
</div>
